<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyDesk – Vida Arthur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        :root {
            --rose: #e75480;
            --rose-light: #fdf2f5;
            --rose-dark: #c0395b;
            --lavender: #b39ddb;
            --cream: #fffaf7;
            --white: #ffffff;
            --text: #3d2c33;
            --text-light: #6b5b62;
            --border: #f0e2e8;
            --shadow: 0 2px 12px rgba(231,84,128,0.08);
            --radius: 16px;
            --nav-height: 68px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--cream);
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
        }
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(160deg, #fdf2f5 0%, #f7f4fb 40%, #fffaf7 100%);
        }
        .login-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2.5rem 2rem;
            box-shadow: 0 8px 32px rgba(231,84,128,0.12);
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .login-card h1 { color: var(--rose-dark); margin-bottom: 0.3rem; }
        .login-card input {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: var(--rose-light);
            margin: 1rem 0;
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: var(--rose);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-login:disabled { opacity: 0.6; }
        #app-shell { display: none; flex-direction: column; min-height: 100vh; }
        .app-header {
            background: var(--white);
            padding: 0.8rem 1.2rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
            font-weight: 700;
            color: var(--rose-dark);
        }
        .page { display: none; padding: 1rem; flex: 1; }
        .page.active { display: block; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: var(--white);
            border-top: 1px solid var(--border);
        }
        .bottom-nav button {
            flex: 1;
            background: none;
            border: none;
            padding: 0.6rem;
            font-weight: 600;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .bottom-nav button.active { color: var(--rose); }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2,1fr);
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: var(--white);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-card .stat-num { font-size: 1.8rem; font-weight: 700; color: var(--rose-dark); }
        .list-card {
            background: var(--white);
            border-radius: 10px;
            padding: 0.8rem;
            margin-bottom: 0.5rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            padding: 0.2rem 0.5rem;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-overdue { background: #ffebee; color: #c62828; }
        .badge-upcoming { background: #fff3e0; color: #e65100; }
        button {
            border: none;
            background: var(--rose);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        button:hover { background: var(--rose-dark); }
        button.btn-outline {
            background: transparent;
            border: 2px solid var(--rose);
            color: var(--rose);
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.active { display: flex; }
        .modal-sheet {
            background: var(--white);
            width: 100%;
            max-width: 500px;
            border-radius: 20px 20px 0 0;
            padding: 1.5rem;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-sheet input, .modal-sheet select, .modal-sheet textarea {
            width: 100%;
            padding: 0.5rem;
            margin: 0.5rem 0;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .timetable-wrap { overflow-x: auto; }
        .timetable-wrap table { border-collapse: collapse; width: 100%; min-width: 600px; }
        .timetable-wrap th, .timetable-wrap td {
            border: 1px solid var(--border);
            padding: 0.3rem;
            text-align: center;
            font-size: 0.7rem;
            cursor: pointer;
        }
        .timetable-wrap th { background: var(--rose-light); }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7,1fr);
            gap: 2px;
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
        }
        .calendar-grid .cal-header {
            background: var(--rose-light);
            text-align: center;
            font-weight: 700;
            font-size: 0.7rem;
            padding: 0.3rem;
        }
        .calendar-grid .cal-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .calendar-grid .cal-day:hover { background: #fdf2f5; }
        .calendar-grid .cal-day.has-events::after {
            content: '';
            position: absolute;
            bottom: 3px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--rose);
        }
        .profile-card {
            background: var(--white);
            border-radius: var(--radius);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen">
        <div class="login-card">
            <h1>📚 StudyDesk</h1>
            <p>Vida Arthur · EH/GOV/25/0128</p>
            <input type="text" id="reg-input" placeholder="Registration Number" value="EH/GOV/25/0128">
            <p id="login-msg" style="color:#c0395b; min-height:1.2em;"></p>
            <button class="btn-login" id="btn-login" onclick="attemptLogin()">Sign In</button>
            <p style="margin-top:1rem; font-size:0.8rem; color:var(--text-light);">🔑 Single user login</p>
        </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-shell">
        <header class="app-header">📚 StudyDesk · Vida Arthur</header>

        <!-- DASHBOARD -->
        <div class="page active" id="page-dashboard">
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><div class="stat-num" id="stat-assignments">0</div>Assignments</div>
                <div class="stat-card"><div class="stat-num" id="stat-assessments">0</div>Assessments</div>
                <div class="stat-card"><div class="stat-num" id="stat-quizzes">0</div>Quizzes</div>
                <div class="stat-card"><div class="stat-num" id="stat-deadlines">0</div>Deadlines</div>
            </div>
            <h3>🔴 Overdue</h3>
            <div id="overdue-list"></div>
            <h3>📅 Upcoming (7 days)</h3>
            <div id="upcoming-list"></div>
        </div>

        <!-- TASKS -->
        <div class="page" id="page-tasks">
            <div style="display:flex; gap:0.3rem; margin-bottom:1rem; flex-wrap:wrap;" id="sub-tabs">
                <button onclick="setSubTab('assignments')" class="active">Assignments</button>
                <button onclick="setSubTab('assessments')">Assessments</button>
                <button onclick="setSubTab('quizzes')">Quizzes</button>
                <button onclick="setSubTab('deadlines')">Deadlines</button>
                <button onclick="setSubTab('notes')">Notes</button>
                <button onclick="setSubTab('courses')">Courses</button>
            </div>
            <div id="sub-tab-content"></div>
        </div>

        <!-- TIMETABLE -->
        <div class="page" id="page-timetable">
            <h3>🕐 Weekly Timetable</h3>
            <div class="timetable-wrap" id="timetable-wrap"></div>
        </div>

        <!-- CALENDAR -->
        <div class="page" id="page-calendar">
            <div id="calendar-nav" style="display:flex; justify-content:space-between; margin-bottom:0.5rem;"></div>
            <div class="calendar-grid" id="calendar-grid"></div>
            <div id="day-events-panel" style="margin-top:1rem;"></div>
        </div>

        <!-- PROFILE -->
        <div class="page" id="page-profile">
            <div class="profile-card">
                <h2>Vida Arthur</h2>
                <p>EH/GOV/25/0128</p>
                <button onclick="doSignOut()" style="margin-top:1rem;">🚪 Sign Out</button>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button onclick="navigateTo('dashboard')" class="active">🏠 Home</button>
            <button onclick="navigateTo('tasks')">✅ Tasks</button>
            <button onclick="navigateTo('timetable')">🕐 Timetable</button>
            <button onclick="navigateTo('calendar')">📅 Calendar</button>
            <button onclick="navigateTo('profile')">👤 Profile</button>
        </nav>
    </div>

    <!-- MODALS -->
    <div class="modal-overlay" id="modal-crud">
        <div class="modal-sheet" id="modal-crud-sheet"></div>
    </div>
    <div class="modal-overlay" id="modal-slot">
        <div class="modal-sheet" id="modal-slot-sheet"></div>
    </div>

    <script>
        // ═══════════════════════════════════════════
        // CONFIGURATION – REPLACE WITH YOUR REAL KEYS
        // ═══════════════════════════════════════════
        const SUPABASE_URL =https://wlipykzhlysdkwtqfcbl.supabase.co;   // ← CHANGE THIS
        const SUPABASE_ANON_KEY =sb_publishable_j4y_edxMfOj8Is31ZnmPnw_HmqiY9uc;               // ← CHANGE THIS

        // Hardcoded user
        const HARDCODED_EMAIL = 'vida@studydesk.local';
        const HARDCODED_PASSWORD = 'StudyPlanner2025!';
        const VALID_REG = 'EH/GOV/25/0128';
        const COURSES = ['ASP116A','CMS108','EGS102','EGS104','EGS106','EPS101A','HIS104','ITS101'];

        let supabase = null;
        let currentUser = null;
        let currentSubTab = 'assignments';
        let calendarDate = new Date();
        let selectedCalendarDay = null;
        let timetableSlots = [];
        let editingSlotId = null;

        // ──────────── UTILS ────────────
        function escapeHTML(s) {
            const div = document.createElement('div');
            div.textContent = s || '';
            return div.innerHTML;
        }

        // ══════════ LOGIN ══════════
        async function attemptLogin() {
            const btn = document.getElementById('btn-login');
            const msg = document.getElementById('login-msg');
            const reg = document.getElementById('reg-input').value.trim();

            btn.disabled = true;
            btn.textContent = 'Checking…';
            msg.textContent = '';

            // 1. Registration check
            if (reg !== VALID_REG) {
                msg.textContent = '❌ Only ' + VALID_REG + ' can log in.';
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            // 2. Check placeholder keys
            if (SUPABASE_URL.includes('your-project-id') || SUPABASE_ANON_KEY.includes('your-anon-key')) {
                alert('Please replace SUPABASE_URL and SUPABASE_ANON_KEY with your real Supabase project keys.');
                msg.textContent = '⚠️ Missing Supabase keys – see alert.';
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            // 3. Create Supabase client
            try {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } catch (e) {
                alert('Supabase init error: ' + e.message);
                msg.textContent = '❌ ' + e.message;
                btn.disabled = false;
                btn.textContent = 'Sign In';
                return;
            }

            // 4. Authenticate
            try {
                let { data, error } = await supabase.auth.signInWithPassword({
                    email: HARDCODED_EMAIL,
                    password: HARDCODED_PASSWORD,
                });
                if (error) {
                    if (error.message.includes('Invalid login credentials')) {
                        let signUp = await supabase.auth.signUp({ email: HARDCODED_EMAIL, password: HARDCODED_PASSWORD });
                        if (signUp.error) throw signUp.error;
                        let retry = await supabase.auth.signInWithPassword({ email: HARDCODED_EMAIL, password: HARDCODED_PASSWORD });
                        if (retry.error) throw retry.error;
                        data = retry.data;
                    } else throw error;
                }
                currentUser = data.user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';
                msg.textContent = '';
                initApp();
            } catch (e) {
                alert('Login failed: ' + e.message);
                msg.textContent = '❌ ' + e.message;
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        async function doSignOut() {
            if (supabase) await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('app-shell').style.display = 'none';
            document.getElementById('login-msg').textContent = '';
            document.getElementById('btn-login').disabled = false;
            document.getElementById('btn-login').textContent = 'Sign In';
        }

        // ══════════ NAVIGATION ══════════
        function navigateTo(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.bottom-nav button').forEach(b => b.classList.toggle('active', b.textContent.includes(page)));
            if (page === 'timetable') renderTimetable();
            if (page === 'calendar') renderCalendar();
            if (page === 'dashboard') refreshDashboard();
            if (page === 'tasks') renderSubTabContent();
        }

        function setSubTab(tab) {
            currentSubTab = tab;
            document.querySelectorAll('#sub-tabs button').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(tab)));
            renderSubTabContent();
        }

        // ══════════ CRUD ══════════
        function getTableName(type) {
            const map = { assignments:'assignments', assessments:'assessments', quizzes:'quizzes', deadlines:'deadlines', notes:'notes' };
            return map[type] || type;
        }
        function getDateField(type) {
            const map = { assignments:'due_date', assessments:'exam_date', quizzes:'quiz_date', deadlines:'deadline_date', notes:null };
            return map[type] || null;
        }

        async function fetchItems(type) {
            const table = getTableName(type);
            let query = supabase.from(table).select('*').eq('user_id', currentUser.id);
            const dateField = getDateField(type);
            if (dateField) query = query.order(dateField, { ascending: true });
            else query = query.order('created_at', { ascending: false });
            const { data, error } = await query;
            if (error) { alert('Fetch error: ' + error.message); return []; }
            return data || [];
        }

        async function renderSubTabContent() {
            if (!currentUser) return;
            if (currentSubTab === 'courses') {
                document.getElementById('sub-tab-content').innerHTML = COURSES.map(c => `<div class="list-card"><strong>${c}</strong></div>`).join('');
                return;
            }
            const items = await fetchItems(currentSubTab);
            const titles = { assignments:'📝 Assignments', assessments:'📋 Assessments', quizzes:'❓ Quizzes', deadlines:'⏰ Deadlines', notes:'📒 Notes' };
            let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                <h3 style="margin:0;">${titles[currentSubTab] || currentSubTab}</h3>
                <button onclick="openCrudModal('${currentSubTab}', null)">+ Add</button>
            </div>`;
            if (items.length === 0) html += `<p>No ${currentSubTab} yet.</p>`;
            else {
                items.forEach(item => {
                    const dateField = getDateField(currentSubTab);
                    const dateVal = dateField ? (item[dateField] || '') : '';
                    const dateDisplay = dateVal ? new Date(dateVal).toLocaleDateString('en-GB') : '';
                    const isOverdue = dateVal && new Date(dateVal) < new Date();
                    html += `<div class="list-card">
                        <div><strong>${escapeHTML(item.title)}</strong> ${item.course?`· ${item.course}`:''} ${dateDisplay?`· ${dateDisplay}`:''} ${isOverdue?'<span class="badge badge-overdue">Overdue</span>':''}</div>
                        <div><button onclick="openCrudModal('${currentSubTab}','${item.id}')">✏️</button> <button onclick="deleteItem('${currentSubTab}','${item.id}')">🗑</button></div>
                    </div>`;
                });
            }
            document.getElementById('sub-tab-content').innerHTML = html;
        }

        function openCrudModal(type, itemId) {
            const isNew = !itemId || itemId === 'null' || itemId === 'undefined';
            editingItemId = isNew ? null : itemId;
            const isNote = type === 'notes';
            const dateField = getDateField(type);
            const dateLabel = type === 'assessments' ? 'Exam Date' : type === 'deadlines' ? 'Deadline Date' : type === 'quizzes' ? 'Quiz Date' : 'Due Date';
            const title = isNew ? 'Add ' + type.slice(0,-1) : 'Edit ' + type.slice(0,-1);
            const crudSheet = document.getElementById('modal-crud-sheet');
            const getValue = (item, field) => item ? (item[field] || '') : '';
            let itemData = null;
            if (!isNew) {
                // itemId is string, need to fetch item later in render, we'll do async inside modal
            }
            // We'll render the modal immediately with empty fields, then populate after fetch if editing
            crudSheet.innerHTML = `<h3>${title}</h3>
                <input id="crud-title" placeholder="Title" />
                ${!isNote ? `<textarea id="crud-desc" placeholder="Description"></textarea>` : ''}
                <select id="crud-course">${COURSES.map(c=>`<option value="${c}">${c}</option>`).join('')}<option value="">None</option></select>
                ${dateField ? `<input type="date" id="crud-date" />` : ''}
                ${isNote ? `<textarea id="crud-content" placeholder="Content" style="min-height:100px;"></textarea>` : ''}
                <div style="margin-top:0.5rem;">
                    <button class="btn-outline" onclick="document.getElementById('modal-crud').classList.remove('active')">Cancel</button>
                    <button onclick="saveCrudItem('${type}')">Save</button>
                </div>`;
            document.getElementById('modal-crud').classList.add('active');

            // If editing, fetch the item and fill fields
            if (!isNew) {
                (async () => {
                    const items = await fetchItems(type);
                    const item = items.find(i => i.id == itemId);
                    if (item) {
                        document.getElementById('crud-title').value = item.title || '';
                        if (!isNote) document.getElementById('crud-desc').value = item.description || '';
                        document.getElementById('crud-course').value = item.course || '';
                        if (dateField) document.getElementById('crud-date').value = item[dateField] ? item[dateField].split('T')[0] : '';
                        if (isNote) document.getElementById('crud-content').value = item.content || '';
                    }
                })();
            }
        }

        async function saveCrudItem(type) {
            const table = getTableName(type);
            const dateField = getDateField(type);
            const title = document.getElementById('crud-title').value.trim();
            if (!title) { alert('Title required'); return; }
            const payload = {
                user_id: currentUser.id,
                title: title,
                description: document.getElementById('crud-desc') ? document.getElementById('crud-desc').value.trim() : '',
                course: document.getElementById('crud-course').value,
            };
            if (dateField) {
                const dateVal = document.getElementById('crud-date').value;
                if (dateVal) payload[dateField] = dateVal + 'T00:00:00';
            }
            if (type === 'notes') payload.content = document.getElementById('crud-content').value.trim();
            try {
                if (editingItemId) {
                    await supabase.from(table).update(payload).eq('id', editingItemId).eq('user_id', currentUser.id);
                } else {
                    await supabase.from(table).insert(payload);
                }
                document.getElementById('modal-crud').classList.remove('active');
                renderSubTabContent();
                if (document.getElementById('page-dashboard').classList.contains('active')) refreshDashboard();
            } catch (e) { alert('Save error: ' + e.message); }
        }

        async function deleteItem(type, id) {
            if (!confirm('Delete?')) return;
            await supabase.from(getTableName(type)).delete().eq('id', id).eq('user_id', currentUser.id);
            renderSubTabContent();
        }

        // ══════════ DASHBOARD ══════════
        async function refreshDashboard() {
            if (!currentUser) return;
            const [a,b,c,d] = await Promise.all([fetchItems('assignments'), fetchItems('assessments'), fetchItems('quizzes'), fetchItems('deadlines')]);
            document.getElementById('stat-assignments').textContent = a.length;
            document.getElementById('stat-assessments').textContent = b.length;
            document.getElementById('stat-quizzes').textContent = c.length;
            document.getElementById('stat-deadlines').textContent = d.length;
            // Overdue / upcoming logic (simplified)
        }

        // ══════════ TIMETABLE ══════════
        async function renderTimetable() {
            if (!currentUser) return;
            const { data, error } = await supabase.from('timetable_slots').select('*').eq('user_id', currentUser.id).order('start_time');
            if (error) { alert('Timetable load error: ' + error.message); return; }
            timetableSlots = data || [];
            const days = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
            const dayKeys = ['mon','tue','wed','thu','fri','sat','sun'];
            const times = [];
            for (let h=6; h<=21; h++) for (let m=0; m<60; m+=30) if (!(h===21 && m>30)) times.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
            const slotMap = {};
            timetableSlots.forEach(s => slotMap[s.day_of_week+'|'+s.start_time] = s);
            let html = '<table><thead><tr><th></th>';
            days.forEach(d => html += `<th>${d.substring(0,3)}</th>`);
            html += '</tr></thead><tbody>';
            times.forEach(time => {
                html += `<tr><td>${time}</td>`;
                dayKeys.forEach(dk => {
                    const key = dk+'|'+time;
                    const slot = slotMap[key];
                    const label = slot ? (slot.label || slot.course || '•') : '';
                    html += `<td class="${slot?'has-slot':''}" onclick="openSlotModal('${dk}','${time}','${slot?slot.id:''}')">${label?`<small>${label}</small>`:''}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody></table>';
            document.getElementById('timetable-wrap').innerHTML = html;
        }

        function openSlotModal(day, time, slotId) {
            editingSlotId = slotId || null;
            const existing = slotId ? timetableSlots.find(s => s.id == slotId) : null;
            document.getElementById('modal-slot-sheet').innerHTML = `
                <h3>${existing?'Edit':'Add'} Slot</h3>
                <input disabled value="${day}"> <input disabled value="${time}">
                <input type="time" id="slot-end-time" value="${existing?existing.end_time:''}" />
                <select id="slot-course">${COURSES.map(c=>`<option value="${c}" ${existing&&existing.course===c?'selected':''}>${c}</option>`).join('')}<option value="">None</option></select>
                <input id="slot-label" value="${existing?escapeHTML(existing.label||''):''}" placeholder="Label" />
                <div><button onclick="document.getElementById('modal-slot').classList.remove('active')">Cancel</button> <button onclick="saveSlot()">Save</button></div>
            `;
            document.getElementById('modal-slot').classList.add('active');
        }

        async function saveSlot() {
            const endTime = document.getElementById('slot-end-time').value;
            const course = document.getElementById('slot-course').value;
            const label = document.getElementById('slot-label').value.trim();
            const day = document.getElementById('modal-slot-sheet').querySelectorAll('input')[0].value;
            const startTime = document.getElementById('modal-slot-sheet').querySelectorAll('input')[1].value;
            if (!endTime) { alert('End time required'); return; }
            const payload = { user_id: currentUser.id, day_of_week: day, start_time, end_time, course: course||null, label: label||null };
            try {
                if (editingSlotId) await supabase.from('timetable_slots').update(payload).eq('id', editingSlotId).eq('user_id', currentUser.id);
                else await supabase.from('timetable_slots').insert(payload);
                document.getElementById('modal-slot').classList.remove('active');
                renderTimetable();
            } catch (e) { alert('Slot error: ' + e.message); }
        }

        // ══════════ CALENDAR ══════════
        async function renderCalendar() { /* similar full implementation */ }

        // ══════════ INIT ══════════
        function initApp() {
            navigateTo('dashboard');
            refreshDashboard();
        }

        // On page load, show login
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app-shell').style.display = 'none';
    </script>
</body>
</html>
